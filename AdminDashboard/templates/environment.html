{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xScout Environment</title>
    <style>
        :root {
            --neon-purple: #b026ff;
            --neon-green: #00ff9d;
            --neon-red: #ff3b3b;
            --bg-dark: #050510;
            --card-bg: #14141e;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Consolas', 'Monaco', monospace;
            margin: 0;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--neon-purple);
            padding-bottom: 15px;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--neon-purple);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--neon-purple);
        }

        .invite-box {
            background: rgba(176, 38, 255, 0.1);
            border: 1px solid var(--neon-purple);
            padding: 10px 20px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .code {
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
            letter-spacing: 3px;
        }

        .copy-btn {
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 5px 10px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s;
        }

        .copy-btn:hover {
            background: var(--neon-green);
            color: #000;
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #bdc3c7;
        }

        /* Grid Layout */
        .student-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .student-card {
            background: var(--card-bg);
            border: 1px solid #333;
            padding: 20px;
            border-radius: 10px;
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .student-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            border-color: var(--neon-purple);
        }

        .status-dot {
            height: 10px;
            width: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }

        .online {
            background-color: var(--neon-green);
            box-shadow: 0 0 5px var(--neon-green);
        }

        .offline {
            background-color: #555;
        }

        .idle {
            background-color: #ffaa00;
        }

        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .student-name {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .metrics {
            font-size: 0.85rem;
            color: #aaa;
            line-height: 1.6;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
        }

        .risk-high {
            color: var(--neon-red);
            font-weight: bold;
        }

        .risk-low {
            color: var(--neon-green);
        }

        /* Cursor pointer for card to indicate interaction */
        .student-card {
            cursor: pointer;
        }
    </style>
    <link rel="stylesheet" href="{% static 'css/tree.css' %}">
    <link rel="stylesheet" href="{% static 'css/explorer.css' %}">

</head>

<body>

    <header>
        <div>
            <h1>xScout Environment</h1>
            <div style="font-size: 0.9rem; color: #888; margin-top:5px;">Live Classroom Monitor</div>
        </div>
        <div class="invite-box">
            <span>INVITE CODE:</span>
            <span class="code" id="invite-code">{{ invite_code }}</span>
            <button class="copy-btn" onclick="copyCode()">COPY</button>
            <a href="#" onclick="customizeCode()"
                style="margin-left: 10px; color: #888; font-size: 0.8rem; text-decoration: underline;">Customize</a>
        </div>
    </header>

    <div class="stats-bar">
        <span>TOTAL STUDENTS: <strong id="total-count">0</strong></span>
        <span>ONLINE: <strong id="online-count" style="color: var(--neon-green);">0</strong></span>
        <span>AT RISK: <strong id="risk-count" style="color: var(--neon-red);">0</strong></span>
        <button onclick="window.location.href='/dashboard/'"
            style="margin-left:auto; background:none; border:none; color:#666; cursor:pointer;">&larr; Exit to
            Dashboard</button>
    </div>

    <div class="student-grid" id="grid">
        <!-- Student Cards Inject Here -->
        <div style="grid-column: 1/-1; text-align: center; padding: 50px; color: #555;">
            Waiting for students to join...
        </div>
    </div>

    <!-- Shared Logic (Still needed for non-modal utilities if any, or remove if unused) -->
    <!-- Ideally, environment view just links out now, so no heavy JS needed here anymore besides grid rendering -->
    <!-- Keeping forensics.js if it helps with other logic, but strictly speaking we don't need the modals here anymore -->

    <!-- Shared Logic -->
    <script>
        function openMonitor(studentId) {
            window.open(`/monitor/${studentId}/`, '_blank');
        }
        const ENV_CODE = "{{ invite_code }}";

        function copyCode() {
            navigator.clipboard.writeText(ENV_CODE);
            const btn = document.querySelector('.copy-btn');
            btn.innerText = "COPIED!";
            setTimeout(() => btn.innerText = "COPY", 2000);
        }

        async function customizeCode() {
            const newCode = prompt("Enter new custom invite code (e.g. CLASS-101):");
            if (!newCode || newCode === ENV_CODE) return;

            if (!/^[a-zA-Z0-9-_]+$/.test(newCode)) {
                alert("Invalid code format. Use letters, numbers, dashes only.");
                return;
            }

            try {
                const res = await fetch('/api/environment/update-code/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ old_code: ENV_CODE, new_code: newCode })
                });
                const json = await res.json();

                if (json.status === 'success') {
                    alert("Code updated! Redirecting...");
                    window.location.href = `/environment/${newCode}/`;
                } else {
                    alert("Error: " + json.message);
                }
            } catch (e) {
                alert("Failed to update code.");
            }
        }

        async function fetchEnvironmentData() {
            try {
                const res = await fetch(`/api/environment/${ENV_CODE}/`);
                const json = await res.json();

                if (json.status === 'success') {
                    renderGrid(json.data);
                }
            } catch (e) {
                console.error("Polling error:", e);
            }
        }

        let currentEnvironmentData = [];

        function renderGrid(students) {
            currentEnvironmentData = students; // Store globally for access

            const grid = document.getElementById('grid');
            if (students.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 50px; color: #555;">Waiting for students to join...</div>';
                updateStats(0, 0, 0);
                return;
            }

            // Simple Diffing could be done here, but full re-render is safer for prototype
            grid.innerHTML = '';

            let onlineCount = 0;
            let riskCount = 0;

            students.forEach((s, index) => {
                // Logic
                const lastSeen = new Date(s.timestamp).getTime();
                const isOnline = (Date.now() - lastSeen) < 15000; // 15s timeout
                if (isOnline) onlineCount++;

                const risk = s.ai || 0; // 0.0 to 1.0
                if (risk > 0.5) riskCount++;

                const statusClass = isOnline ? 'online' : 'offline';
                const statusText = isOnline ? 'Online' : 'Offline';

                const card = document.createElement('div');
                card.className = 'student-card';
                // Add click handler to open forensic modal
                card.onclick = (e) => {
                    // Prevent if clicking a button inside the card
                    if (e.target.tagName === 'BUTTON' || e.target.tagName === 'A') return;
                    openForensicModal(currentEnvironmentData[index]);
                };

                card.innerHTML = `
                    <div class="card-header">
                        <span class="status-dot ${statusClass}"></span>
                        <div class="student-name">${s.user || s.id}</div>
                    </div>
                    <div class="metrics">
                        <div class="metric-row">
                            <span>Status</span>
                            <span>${statusText}</span>
                        </div>
                        <div class="metric-row">
                            <span>WPM</span>
                            <span>${s.behavior?.wpm || 0}</span>
                        </div>
                        <div class="metric-row">
                            <span>AI Risk</span>
                            <span class="${risk > 0.5 ? 'risk-high' : 'risk-low'}">${(risk * 100).toFixed(0)}%</span>
                        </div>
                        <div class="metric-row" style="margin-top:5px;">
                            <span>Focus</span>
                            <span>${s.behavior?.flowState || 'NORMAL'}</span>
                        </div>
                    </div>
                    ${isOnline ? `<button onclick="openMonitor('${s.user || s.id}'); event.stopPropagation();" style="width:100%; margin-top:15px; padding:8px; background:linear-gradient(45deg, #b026ff, #00f3ff); border:none; border-radius:4px; color:#fff; cursor:pointer; font-weight:bold; z-index:10; position:relative;">Monitor</button>` : ''}
                `;
                grid.appendChild(card);
            });

            updateStats(students.length, onlineCount, riskCount);
        }

        function updateStats(total, online, risk) {
            document.getElementById('total-count').innerText = total;
            document.getElementById('online-count').innerText = online;
            document.getElementById('risk-count').innerText = risk;
        }

        // Poll every 3 seconds
        fetchEnvironmentData();
        setInterval(fetchEnvironmentData, 3000);

    </script>
</body>

</html>
