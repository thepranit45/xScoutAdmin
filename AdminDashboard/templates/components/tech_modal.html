<!-- Tech Stack Modal -->
<div id="tech-stack-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <div style="display: flex; align-items: center; gap: 15px;">
                <h2 style="margin: 0;">Technology Stack Analysis</h2>
                <button onclick="analyzeStack()"
                    style="background: transparent; border: 1px solid #444; color: #00f3ff; border-radius: 4px; cursor: pointer; padding: 4px 8px; font-size: 0.8rem; transition: all 0.2s;"
                    onmouseover="this.style.background='rgba(0, 243, 255, 0.1)'"
                    onmouseout="this.style.background='transparent'">
                    ⟳ Refresh
                </button>
            </div>
            <span class="close-modal"
                onclick="document.getElementById('tech-stack-modal').style.display='none'">&times;</span>
        </div>
        <div class="modal-body">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                <div class="glass-panel" style="padding: 15px;">
                    <h4 style="color: #aaa; margin-bottom: 10px;">Project Metadata</h4>
                    <div style="margin-bottom: 5px;">Author: <strong id="tech-author"
                            style="color: white; margin-left: 5px;">-</strong></div>
                    <div style="margin-bottom: 5px;">Created: <strong id="tech-created"
                            style="color: white; margin-left: 5px;">-</strong></div>
                    <div>Git Tracking: <span id="tech-git" style="margin-left: 5px;">-</span></div>
                </div>
            </div>

            <h3 class="section-title">Detected Technologies</h3>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
                <div class="glass-panel" style="padding: 15px;">
                    <h4 style="color: #00f3ff; margin-bottom: 10px;">Frontend</h4>
                    <div id="tech-frontend" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
                </div>
                <div class="glass-panel" style="padding: 15px;">
                    <h4 style="color: #B026FF; margin-bottom: 10px;">Backend</h4>
                    <div id="tech-backend" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
                </div>
                <div class="glass-panel" style="padding: 15px;">
                    <h4 style="color: #f1e05a; margin-bottom: 10px;">Database</h4>
                    <div id="tech-database" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
                </div>
                <div class="glass-panel" style="padding: 15px;">
                    <h4 style="color: #ff6b6b; margin-bottom: 10px;">DevOps / Tools</h4>
                    <div id="tech-devops" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
                </div>
            </div>
        </div>
    </div>
</div>
