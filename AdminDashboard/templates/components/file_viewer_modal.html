<!-- File Viewer Panel (Split Screen Layout) -->
<div id="file-viewer-modal" class="modal"
    style="display: none; z-index: 1500; position: fixed; top: 0; left: 260px; width: calc(100% - 260px); height: 100vh; background: var(--bg); overflow: hidden; border-left: 1px solid var(--border);">
    <div class="modal-content"
        style="width: 100%; max-width: none; height: 100%; margin: 0; border: none; border-radius: 0; display: flex; flex-direction: column; background: var(--card-bg);">
        <div class="modal-header" style="background: var(--table-header-bg); border-bottom: 1px solid var(--border); padding: 16px 24px;">
            <h2 id="file-viewer-filename" style="font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; font-size: 0.95rem; color: var(--text-main);">filename.py</h2>
            <span class="close-modal"
                onclick="document.getElementById('file-viewer-modal').style.display='none'" style="font-size: 1.5rem;">&times;</span>
        </div>
        <div class="modal-body" style="flex: 1; overflow: hidden; padding: 0;">
            <div id="code-scroller"
                style="width: 100%; height: 100%; overflow: auto; display: flex; background: var(--card-bg);">
                <div id="line-numbers" style="
                    background: var(--table-header-bg); 
                    color: var(--text-light); 
                    padding: 24px 12px 24px 0; 
                    text-align: right; 
                    border-right: 1px solid var(--border); 
                    font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; 
                    font-size: 0.85rem; 
                    line-height: 1.6;
                    min-height: 100%;
                    user-select: none;
                    min-width: 54px;">
                </div>
                <pre id="file-viewer-code" style="
                    flex: 1; 
                    margin: 0; 
                    padding: 24px; 
                    color: var(--text-main); 
                    background: var(--card-bg); 
                    font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; 
                    font-size: 0.85rem; 
                    line-height: 1.6;
                    overflow: visible; 
                    border: none;"></pre>
            </div>
        </div>
    </div>
</div>
