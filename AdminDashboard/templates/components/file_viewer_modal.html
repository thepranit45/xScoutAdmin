<!-- File Viewer Panel (Split Screen Layout) -->
<div id="file-viewer-modal" class="modal"
    style="display: none; z-index: 1500; position: fixed; top: 0; left: 320px; width: calc(100% - 320px); height: 100vh; background: #0f0518; overflow: hidden;">
    <div class="modal-content"
        style="width: 100%; max-width: none; height: 100%; margin: 0; border: none; border-radius: 0; display: flex; flex-direction: column; background: #0f0518;">
        <div class="modal-header" style="background: rgba(0,0,0,0.5); border-bottom: 1px solid var(--border);">
            <h2 id="file-viewer-filename" style="font-family: monospace;">filename.py</h2>
            <span class="close-modal"
                onclick="document.getElementById('file-viewer-modal').style.display='none'">&times;</span>
        </div>
        <div class="modal-body" style="flex: 1; overflow: hidden; padding: 0;">
            <div id="code-scroller"
                style="width: 100%; height: 100%; overflow: auto; display: flex; background: #1e1e1e;">
                <div id="line-numbers" style="
                    background: #1e1e1e; 
                    color: #6e7681; 
                    padding: 20px 10px 20px 0; 
                    text-align: right; 
                    border-right: 1px solid #333; 
                    font-family: 'Consolas', 'Monaco', monospace; 
                    font-size: 0.9rem; 
                    line-height: 1.5;
                    min-height: 100%;
                    user-select: none;
                    min-width: 50px;">
                </div>
                <pre id="file-viewer-code" style="
                    flex: 1; 
                    margin: 0; 
                    padding: 20px; 
                    color: #d4d4d4; 
                    background: #1e1e1e; 
                    font-family: 'Consolas', 'Monaco', monospace; 
                    font-size: 0.9rem; 
                    line-height: 1.5;
                    overflow: visible; 
                    border: none;"></pre>
            </div>
        </div>
    </div>
</div>
