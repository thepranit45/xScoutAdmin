name: xScout CI (Django)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    name: Backend Tests (Django)
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        cache: 'pip' # caching pip dependencies

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest pytest-django flake8

    - name: Lint Check
      run: |
        # Fail the build for critical syntax errors
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Non-blocking check for other styles (standard GitHub Action behavior)
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run Backend Tests
      run: |
        # Set dummy env vars for CI and point to correct settings
        export DJANGO_SETTINGS_MODULE=dashboard.settings
        python -m pytest tests/test_dummy.py
